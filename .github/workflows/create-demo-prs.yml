name: Create Demo Review PRs
on:
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read

jobs:
  create-prs:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: PR 1 - RLS fix
        run: |
          gh pr create \
            --repo afcrichmond-labs/richmond-api \
            --title "feat: RLS policy enforcement for analytics aggregate queries (ENG-55)" \
            --body "Patches RLS gap where tenant_id missing from GROUP BY in aggregate CTEs. 12 new regression tests. Blocking Sprint 8 analytics deploy. Jira: ENG-55" \
            --head fix/rls-analytics-aggregate-eng55 \
            --base main \
            --reviewer roy-afcrichmond || true

      - name: PR 2 - v1 deprecation headers
        run: |
          gh pr create \
            --repo afcrichmond-labs/richmond-api \
            --title "feat: API v1 deprecation headers + sunset logging (ENG-56)" \
            --body "Adds Sunset + Deprecation headers on all v1 routes. Per-API-key usage logging for partner outreach. Blocking partner emails scheduled Monday. Jira: ENG-56" \
            --head feat/api-v1-deprecation-headers-eng56 \
            --base main \
            --reviewer roy-afcrichmond || true
